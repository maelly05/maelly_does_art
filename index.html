<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lily's little shop</title>

<style>
body {
  margin: 0;
  font-family: "Comic Sans MS", cursive;
  background: url("fond.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: #233943;
  text-align: center;
}

header {
  padding: 30px;
  font-size: 2em;
  background: #fdf1b8;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.art {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin: 15px;
  width: 250px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}

.art:hover {
  transform: scale(1.05);
}

.art img {
  width: 100%;
  border-radius: 15px;
}

button {
  background: #fdf1b8;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #ff3385;
}

footer {
  padding: 20px;
  background: #ffd1e6;
}
</style>
</head>

<body>

<header>
Lily's little shop 
<p style="font-size: 0.5em;">The illusion of detail</p>
<button onclick="voirPanier()">🛒 Panier</button>
</header>

<section class="gallery">

  <div class="art">
  <a href="art1.html">
    <img src="https://via.placeholder.com/300">
    <h3>Nostalgie</h3>
    <p>500$</p>
  </a>

  <button onclick="ajouterAuPanier('Nostalgie', 500)">
    Ajouter au panier
  </button>

  <button onclick="window.location.href='art1.html'">
    Voir détails
  </button>
</div>

  <div class="art">
    <img src="https://via.placeholder.com/300" alt="art2">
    <h3>Changement</h3>
    <p>400$</p>
    <button onclick="acheter()">Acheter</button>
  </div>

  <div class="art">
    <img src="https://via.placeholder.com/300" alt="art3">
    <h3>Liberté</h3>
    <p>300$</p>
    <button onclick="acheter()">Acheter</button>
  </div>

</section>

<footer>
<p>Contact : maelly.salvail.art@email.com</p>
<p>© 2026 Maëlly Salvail</p>
</footer>

<script>
<script>

let panier = [];

function ajouterAuPanier(nom, prix) {
  panier.push({ nom, prix });
  alert(nom + " ajouté au panier 🛒");
}

function voirPanier() {
  let total = 0;
  let texte = "🛒 TON PANIER:\n\n";

  panier.forEach(item => {
    texte += item.nom + " - " + item.prix + "$\n";
    total += item.prix;
  });

  texte += "\nTOTAL : " + total + "$";

  alert(texte);
}

function paypal(prix) {
  window.location.href = "https://paypal.me/TONLIEN/" + prix;
}

</script>


</body>
</html>
